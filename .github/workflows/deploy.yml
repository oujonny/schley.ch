# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy to beta.schley.ch

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["development", "cms/**"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  statuses: write

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  build_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.105.0'
          extended: true
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1
      - name: Cache Hugo build
        uses: actions/cache@v4
        with:
          path: /tmp/hugo_cache
          key: ${{ runner.os }}-hugo-build-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-hugo-build-
      - name: Build
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --minify --noBuildLock --cacheDir /tmp/hugo_cache
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          name: id_rsa
          known_hosts: ${{ secrets.KNOWN_HOSTS }}
      - name: Deploy
        env:
          SSH_USER: "toxykiwo"
          HOST: "s106.cyon.net"
          DIR: "public_html/beta.schley.ch/"
        run: rsync -avz --delete-during public/ ${SSH_USER}@${HOST}:~/${DIR}
      - name: Set deploy status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state=success \
            -f target_url=https://beta.schley.ch \
            -f description="deploy" \
            -f context="deploy"
